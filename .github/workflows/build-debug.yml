name: Windows Debug Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build (Debug) — .NET 8 / Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore MinecraftIDChanger/MinecraftIDChanger.csproj

      - name: Build (Debug)
        run: >
          dotnet build MinecraftIDChanger/MinecraftIDChanger.csproj
          --configuration Debug
          --no-restore

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-PSN-ID-Changer-DEBUG
          path: MinecraftIDChanger/bin/Debug/net8.0-windows/
          if-no-files-found: error
