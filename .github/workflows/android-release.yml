name: Android Release Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build (Release) + Unit Tests — Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      - name: Run unit tests
        working-directory: android
        run: ./gradlew :app:testReleaseUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-Test-Results-RELEASE
          path: android/app/build/reports/tests/testReleaseUnitTest/
          if-no-files-found: warn

      # ── Optional APK signing ───────────────────────────────────────────────
      # To enable signing, add these secrets to your repository:
      #   KEYSTORE_BASE64     – base64-encoded .jks keystore
      #   KEY_ALIAS           – key alias inside the keystore
      #   KEY_PASSWORD        – key password
      #   STORE_PASSWORD      – keystore password
      - name: Decode keystore (if secret present)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Build Release APK
        working-directory: android
        env:
          SIGNING_KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-PSN-ID-Changer-RELEASE-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
