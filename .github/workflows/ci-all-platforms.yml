name: CI — All Platforms

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Windows (.NET 8 WinForms) — Debug & Release
  # ────────────────────────────────────────────────────────────────────────────
  windows-debug:
    name: Windows Debug (.NET 8)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MinecraftIDChanger/MinecraftIDChanger.csproj

      - name: Build (Debug)
        run: dotnet build MinecraftIDChanger/MinecraftIDChanger.csproj --configuration Debug --no-restore

      - name: Upload Debug EXE
        uses: actions/upload-artifact@v4
        with:
          name: Windows-DEBUG
          path: MinecraftIDChanger/bin/Debug/net8.0-windows/
          if-no-files-found: error

  windows-release:
    name: Windows Release (.NET 8)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MinecraftIDChanger/MinecraftIDChanger.csproj

      - name: Build (Release)
        run: dotnet build MinecraftIDChanger/MinecraftIDChanger.csproj --configuration Release --no-restore

      - name: Publish single-file EXE
        run: >
          dotnet publish MinecraftIDChanger/MinecraftIDChanger.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output publish/
          -p:PublishSingleFile=true

      - name: Upload Release EXE
        uses: actions/upload-artifact@v4
        with:
          name: Windows-RELEASE-EXE
          path: publish/MinecraftIDChanger.exe
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Android (Kotlin) — Debug & Release, with unit tests
  # ────────────────────────────────────────────────────────────────────────────
  android-debug:
    name: Android Debug APK + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Bootstrap Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.11.1 --distribution-type bin

      - name: Grant Gradle permission
        run: chmod +x android/gradlew

      - name: Unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-Test-Results
          path: android/app/build/reports/tests/
          if-no-files-found: warn

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-DEBUG-APK
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  android-release:
    name: Android Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Bootstrap Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.11.1 --distribution-type bin

      - name: Grant Gradle permission
        run: chmod +x android/gradlew

      - name: Decode keystore (if secret present)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > android/app/release.jks
          fi

      - name: Build Release APK
        working-directory: android
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-RELEASE-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
